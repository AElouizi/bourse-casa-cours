name: Actualisation cours Bourse de Casablanca

on:
  schedule:
    - cron: '30 15 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-cours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Scraper les cours
        run: python3 scraper.py
        timeout-minutes: 8

      - name: Afficher cours.json
        run: cat data/cours.json

      - name: Commit et Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cours.json
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            COUNT=$(python3 -c "import json; print(json.load(open('data/cours.json'))['count'])")
            DATE=$(python3 -c "import json; print(json.load(open('data/cours.json'))['date'])")
            git commit -m "Cours $DATE - $COUNT valeurs"
            git push
          fi
